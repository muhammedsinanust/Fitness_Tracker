apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: fitness-tracker-app
spec:
  replicas: 2
  strategy:
    blueGreen:
      activeService: fitness-tracker-service
      previewService: fitness-tracker-preview
      autoPromotionEnabled: false
  selector:
    matchLabels:
      app: fitness-tracker-app
  template:
    metadata:
      labels:
        app: fitness-tracker-app
      annotations:
        ad.datadoghq.com/fitness-tracker-app.logs: >-
          [{"source":"nodejs","service":"fitness-tracker-service"},
           {"source":"nodejs","service":"fitness-tracker-app"}]
    spec:
      containers:
        - name: fitness-tracker-app
          image: pulkit197/fitness_tracker-master-copy3-fitness-app:latest
          ports:
            - containerPort: 5000
          # ✔ All configMap vars removed
          # ✔ Direct env variables added
          env:
            - name: MONGODB_URI
              value: "mongodb://mongodb-service:27017/fitness-tracker"
            - name: PORT
              value: "5000"
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            # Datadog APM (tracing) env variables
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_ENV
              value: "production"
            - name: DD_SERVICE
              value: "fitness-tracker-app"
            - name: DD_VERSION
              value: "1.0.0"
--- 

apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
spec:
  selector:
    app: fitness-tracker-app
  ports:
  - port: 80
    targetPort: 5000
  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-preview
spec:
  selector:
    app: fitness-tracker-app
  ports:
  - port: 80
    targetPort: 5000
  type: NodePort  
